<div id="container">
    <input is="emc-i18n-input" id="input" i18n-placeholder="Search..." autocomplete="off">
    <div id="view" mode="view">
        <emc-i18n-label id="placeholder"></emc-i18n-label>
        <div id="value">
            <div id="token-container"></div>
            <div id="overflow-counter"></div>
        </div>
    </div>
    <div id="button">
        <emc-font-icon icon="direction-down"></emc-font-icon>
    </div>
    <div id="scroll-container">
        <div id="options-container"></div>
        <emc-i18n-label id="empty" i18n-value="no entries"></emc-i18n-label>
        <emc-i18n-label id="nomatch" i18n-value="no match"></emc-i18n-label>
    </div>
    <select id="native-select" multiple>
        <option is="emc-i18n-option" id="native-empty" i18n-value="no entries" disabled></option>
    </select>
    <slot id="options-slot"></slot>
</div>
