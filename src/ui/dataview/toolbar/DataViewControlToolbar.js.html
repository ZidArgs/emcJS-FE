<div id="content">
    <div id="pagination-control" class="control-container">
        <emc-button id="first" icon="⭰" border-flat="right"></emc-button>
        <emc-button id="decrease" icon="🠔" border-flat="all"></emc-button>
        <input type="number" id="current" value="0">
        <emc-i18n-label id="max-text" i18n-value="of"></emc-i18n-label>
        <div id="max">0</div>
        <emc-button id="increase" icon="🠖" border-flat="all"></emc-button>
        <emc-button id="last" icon="⭲" border-flat="left"></emc-button>
    </div>
    <div id="page-size-control" class="control-container">
        <emc-i18n-label id="size-text" i18n-value="Page size"></emc-i18n-label>
        <select id="size">
            <option value="0">inf</option>
        </select>
    </div>
    <div id="entries-count-control" class="control-container">
        <emc-i18n-label id="entries-text" i18n-value="Entries"></emc-i18n-label>
        <div id="entries"></div>
    </div>
    <div id="total-count-control" class="control-container">
        <emc-i18n-label id="total-text" i18n-value="Total"></emc-i18n-label>
        <div id="total">0</div>
    </div>
</div>
